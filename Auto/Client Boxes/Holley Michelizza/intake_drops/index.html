<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Chunky Agent Kit — 33-slide deck</title>
  <meta name="viewport" content="width=1920, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..900,30..100&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css?v=3"/>
  <style>
    html, body { margin: 0; padding: 0; background: #2A0E1A; }
    body { font-family: Inter, sans-serif; color: #2A0E1A; }
    deck-stage > section {
      width: 1920px; height: 1080px;
      background: var(--page, #F5EADA);
      position: relative;
      overflow: hidden;
    }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.7; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    * { box-sizing: border-box; }
    input, button, textarea { font-family: inherit; color: inherit; }

    /* tilt sticker mode cards */
    body.personality-sticker deck-stage > section .tilt-0 { transform: rotate(-0.7deg); }
    body.personality-sticker deck-stage > section .tilt-1 { transform: rotate(0.9deg); }
    body.personality-sticker deck-stage > section .tilt-2 { transform: rotate(-0.4deg); }
  </style>
</head>
<body class="vibe-candy personality-chunky density-cozy">

<deck-stage>
  <section data-screen-label="01 Cover"><div id="s1"></div></section>
  <section data-screen-label="02 Principles"><div id="s2"></div></section>
  <section data-screen-label="03 Integrations"><div id="s3"></div></section>
  <section data-screen-label="04 Icon library"><div id="s4"></div></section>
  <section data-screen-label="05 Bubbles"><div id="s5"></div></section>
  <section data-screen-label="06 Colors"><div id="s6"></div></section>
  <section data-screen-label="07 Stat cards"><div id="s7"></div></section>
  <section data-screen-label="08 Meters &amp; spinners"><div id="s8"></div></section>
  <section data-screen-label="09 Admonitions"><div id="s9"></div></section>
  <section data-screen-label="10 Inspector"><div id="s10"></div></section>
  <section data-screen-label="11 Status strip"><div id="s11"></div></section>
  <section data-screen-label="12 Chips &amp; badges"><div id="s12"></div></section>
  <section data-screen-label="13 Agent I/O"><div id="s13"></div></section>
  <section data-screen-label="14 State &amp; context"><div id="s14"></div></section>
  <section data-screen-label="15 MCP &amp; tools"><div id="s15"></div></section>
  <section data-screen-label="16 Context menus"><div id="s16"></div></section>
  <section data-screen-label="17 Orchestrator tree"><div id="s17"></div></section>
  <section data-screen-label="18 Pipeline DAG"><div id="s18"></div></section>
  <section data-screen-label="19 File &amp; DOM tree"><div id="s19"></div></section>
  <section data-screen-label="20 Terminal &amp; code"><div id="s20"></div></section>
  <section data-screen-label="21 Git"><div id="s21"></div></section>
  <section data-screen-label="22 Command palette"><div id="s22"></div></section>
  <section data-screen-label="23 Skills &amp; MCPs"><div id="s23"></div></section>
  <section data-screen-label="24 Memory"><div id="s24"></div></section>
  <section data-screen-label="25 Hooks &amp; events"><div id="s25"></div></section>
  <section data-screen-label="26 Keyboard"><div id="s26"></div></section>
  <section data-screen-label="27 Tool calls"><div id="s27"></div></section>
  <section data-screen-label="28 Sample app"><div id="s28"></div></section>
  <section data-screen-label="29 Matrix"><div id="s29"></div></section>
  <section data-screen-label="30 Color"><div id="s30"></div></section>
  <section data-screen-label="31 Type"><div id="s31"></div></section>
  <section data-screen-label="32 Principles"><div id="s32"></div></section>
  <section data-screen-label="33 Fin"><div id="s33"></div></section>
</deck-stage>

<div id="tweaks-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="deck-stage.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="logos.jsx"></script>
<script type="text/babel" src="slides-01-06.jsx"></script>
<script type="text/babel" src="slides-07-12.jsx"></script>
<script type="text/babel" src="slides-widgets-extra.jsx"></script>
<script type="text/babel" src="slides-13-18.jsx"></script>
<script type="text/babel" src="slides-19-24.jsx"></script>
<script type="text/babel" src="slides-25-30.jsx"></script>

<script type="text/babel">
  const slides = [
    Slide01Cover, Slide02Principles, Slide03IntegrationWall, Slide04IconLibrary, Slide05Bubbles, Slide06Colors,
    Slide07Widgets, Slide08TokenMeters, Slide09Admonitions, Slide10Inspector, Slide11Status, Slide12Chips,
    Slide13AgentIO, Slide14StateContext, Slide15MCPTools,
    Slide13ContextMenu, Slide14Orchestrator, Slide15Pipeline, Slide16FileTree, Slide17Terminal, Slide18Git,
    Slide19CommandPalette, Slide20Skills, Slide21Memory, Slide22Hooks, Slide23Keys, Slide24ToolCalls,
    Slide25SampleApp, Slide26Matrix, Slide27Colors, Slide28Type, Slide29Principles, Slide30Fin,
  ];
  slides.forEach((C, i) => {
    const el = document.getElementById('s' + (i+1));
    if (el && C) ReactDOM.createRoot(el).render(<C/>);
  });
</script>

<script type="text/babel">
  // ————— TWEAKS PANEL —————
  // Three expressive controls that reshape the whole deck's feel.

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "vibe": "sky",
    "personality": "soft",
    "density": "cozy"
  }/*EDITMODE-END*/;

  const VIBES = [
    { id: 'candy',  label: 'Candy',  swatches: ['#FBD5DF', '#FDEBBF', '#D2ECDA', '#CFE6F0', '#E3D4EE'] },
    { id: 'sage',   label: 'Sage',   swatches: ['#E8EFD8', '#DFE9C5', '#CFDEB0', '#F1E7CF', '#E3D8BE'] },
    { id: 'sky',    label: 'Sky',    swatches: ['#CFE6F0', '#D7E5F3', '#D2ECDA', '#E5DDF0', '#FBD5DF'] },
    { id: 'mono',   label: 'Mono',   swatches: ['#ECE7DE', '#DED6C6', '#C8BDA7', '#A89C83', '#3D352A'] },
  ];

  const VIBE_OVERRIDES = {
    candy: {}, // default pastel set already in tokens.css
    sage: {
      '--h-pink':   '#E9D9CA',
      '--h-peach':  '#F1E4CB',
      '--h-yellow': '#F1E7CF',
      '--h-mint':   '#DFE9C5',
      '--h-sky':    '#D5E0C4',
      '--h-lilac':  '#E3D8BE',
      '--h-coral':  '#E8CEB5',
      '--h-sage':   '#CFDEB0',
    },
    sky: {
      '--h-pink':   '#D7E5F3',
      '--h-peach':  '#E5DDF0',
      '--h-yellow': '#E9F1D6',
      '--h-mint':   '#D2ECDA',
      '--h-sky':    '#CFE6F0',
      '--h-lilac':  '#E3D4EE',
      '--h-coral':  '#FBD5DF',
      '--h-sage':   '#E0EBEF',
    },
    mono: {
      '--h-pink':   '#ECE7DE',
      '--h-peach':  '#E5DFD3',
      '--h-yellow': '#EDE8DC',
      '--h-mint':   '#E1DCCE',
      '--h-sky':    '#DED6C6',
      '--h-lilac':  '#D6CEBE',
      '--h-coral':  '#E8DFCF',
      '--h-sage':   '#D8D0BF',
    },
  };

  const applyVibe = (v) => {
    document.body.classList.remove('vibe-candy','vibe-sage','vibe-sky','vibe-mono');
    document.body.classList.add('vibe-' + v);
    const overrides = VIBE_OVERRIDES[v] || {};
    const root = document.documentElement;
    // clear any previous overrides first
    ['--h-pink','--h-peach','--h-yellow','--h-mint','--h-sky','--h-lilac','--h-coral','--h-sage'].forEach(k => root.style.removeProperty(k));
    Object.entries(overrides).forEach(([k,val]) => root.style.setProperty(k, val));
  };
  const applyPersonality = (p) => {
    document.body.classList.remove('personality-chunky','personality-soft','personality-sticker');
    document.body.classList.add('personality-' + p);
  };
  const applyDensity = (d) => {
    document.body.classList.remove('density-cozy','density-compact');
    document.body.classList.add('density-' + d);
  };

  const TweakApp = () => {
    const [values, set] = useTweaks(TWEAK_DEFAULTS);

    React.useEffect(() => { applyVibe(values.vibe); }, [values.vibe]);
    React.useEffect(() => { applyPersonality(values.personality); }, [values.personality]);
    React.useEffect(() => { applyDensity(values.density); }, [values.density]);

    return (
      <TweaksPanel title="Tweaks">
        <TweakSection title="Vibe" subtitle="Reshapes every pastel header in the deck.">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
            {VIBES.map(v => (
              <button
                key={v.id}
                onClick={() => set('vibe', v.id)}
                style={{
                  display: 'flex', flexDirection: 'column', gap: 6, padding: 10,
                  background: values.vibe === v.id ? '#2A0E1A' : '#FFF',
                  color: values.vibe === v.id ? '#F5EADA' : '#2A0E1A',
                  border: '2px solid #2A0E1A', borderRadius: 10, cursor: 'pointer',
                  boxShadow: values.vibe === v.id ? '2px 2px 0 #2A0E1A' : 'none',
                  textAlign: 'left',
                }}
              >
                <div style={{ display: 'flex', gap: 3 }}>
                  {v.swatches.map((c,i) => (
                    <div key={i} style={{ width: 14, height: 14, borderRadius: 4, background: c, border: '1.3px solid #2A0E1A' }}/>
                  ))}
                </div>
                <span style={{ fontSize: 12, fontWeight: 700 }}>{v.label}</span>
              </button>
            ))}
          </div>
        </TweakSection>

        <TweakSection title="Card personality" subtitle="Thick & shadowed, soft & subtle, or sticker-stacked.">
          <div style={{ display: 'flex', gap: 6 }}>
            {[
              { id: 'chunky',   label: 'Chunky' },
              { id: 'soft',     label: 'Soft' },
              { id: 'sticker',  label: 'Sticker' },
            ].map(p => (
              <button
                key={p.id}
                onClick={() => set('personality', p.id)}
                style={{
                  flex: 1, padding: '10px 8px', fontSize: 12, fontWeight: 700,
                  background: values.personality === p.id ? '#EF4A73' : '#FFF',
                  color: values.personality === p.id ? '#FFF' : '#2A0E1A',
                  border: '2px solid #2A0E1A', borderRadius: 10, cursor: 'pointer',
                  boxShadow: values.personality === p.id ? '2px 2px 0 #2A0E1A' : 'none',
                }}
              >{p.label}</button>
            ))}
          </div>
        </TweakSection>

        <TweakSection title="Density" subtitle="Cozy = big headers, big padding. Compact = info-dense.">
          <div style={{ display: 'flex', gap: 6 }}>
            {[
              { id: 'cozy',    label: 'Cozy' },
              { id: 'compact', label: 'Compact' },
            ].map(d => (
              <button
                key={d.id}
                onClick={() => set('density', d.id)}
                style={{
                  flex: 1, padding: '10px 8px', fontSize: 12, fontWeight: 700,
                  background: values.density === d.id ? '#F7C948' : '#FFF',
                  color: '#2A0E1A',
                  border: '2px solid #2A0E1A', borderRadius: 10, cursor: 'pointer',
                  boxShadow: values.density === d.id ? '2px 2px 0 #2A0E1A' : 'none',
                }}
              >{d.label}</button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    );
  };

  ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweakApp/>);
</script>

</body>
</html>
